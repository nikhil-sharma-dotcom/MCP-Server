<!DOCTYPE html>
<html>
<head>
    <title>Enterprise Audit Dashboard</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: white;
        }

        .container {
            padding: 40px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .kpi-row {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            flex: 1;
            padding: 25px;
            border-radius: 12px;
            background: #1e293b;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card h3 {
            margin: 0;
            font-weight: 500;
            font-size: 14px;
            color: #94a3b8;
        }

        .card h2 {
            margin: 10px 0 0 0;
            font-size: 28px;
        }

        .high-risk {
            border-left: 6px solid #ef4444;
        }

        .exposure {
            border-left: 6px solid #10b981;
        }

        .charts {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        #severity, #trend {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>Enterprise Compliance Dashboard</h1>

    <!-- KPI Section -->
    <div class="kpi-row">

        <div class="card">
            <h3>Total Findings</h3>
            <h2>{{ kpis.total_findings }}</h2>
        </div>

        <div class="card high-risk">
            <h3>High Risk Issues</h3>
            <h2>{{ kpis.high_risk }}</h2>
        </div>

        <div class="card exposure">
            <h3>Total Exposure</h3>
            <h2>${{ "{:,.0f}".format(kpis.total_exposure) }}</h2>
        </div>

        <div class="card">
            <h3>Last Run</h3>
            <h2 style="font-size:16px;">{{ kpis.last_run }}</h2>
        </div>

    </div>

    <!-- Charts Section -->
    <div class="charts">
        <div id="severity"></div>
        <div id="trend"></div>
    </div>

</div>

<script>
    var severityData = JSON.parse('{{ severity_chart | safe }}');
    Plotly.newPlot('severity', severityData.data, severityData.layout);

    var trendData = JSON.parse('{{ trend_chart | safe }}');
    Plotly.newPlot('trend', trendData.data, trendData.layout);
</script>

</body>
</html>
